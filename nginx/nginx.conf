events {
    worker_connections 1024;
}

http {

    upstream ingestion_gateway {

        least_conn;

        server fintech-pipeline-ingestion-gateway-1:8080 max_fails=3 fail_timeout=30s;
        server fintech-pipeline-ingestion-gateway-2:8080 max_fails=3 fail_timeout=30s;
        server fintech-pipeline-ingestion-gateway-3:8080 max_fails=3 fail_timeout=30s;

    }

    server {

        listen 80;

        location / {

            proxy_pass http://ingestion_gateway;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

        }
    }
}